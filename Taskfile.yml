version: '3'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  status:
    desc: Show status of all services (infrastructure, apps, pi resources)
    cmds:
      - bash scripts/status.sh

  setup:
    desc: Minimal local setup for XTDB event capture (XTDB + deployed logger + UI deps)
    deps:
      - 'xtdb:up'
      - 'ext:deploy:xtdb-logger'
      - 'ui:install'
    cmds:
      - 'echo "Setup complete. Start the UI with: task ui"'
      - 'echo "Then start pi in another terminal."'

  'setup:all':
    desc: Full local setup (XTDB + all pi resources in this repo + UI deps)
    deps:
      - 'hooks:install'
      - 'xtdb:up'
      - 'resources:deploy:all'
      - 'ui:install'
    cmds:
      - 'echo "Full setup complete. Start the UI with: task ui"'
      - 'echo "Then start pi in another terminal."'

  # ── Cluster lifecycle ──────────────────────────────────────────

  'xtdb:up':
    desc: Start XTDB cluster (Redpanda + primary + replica)
    cmds:
      - docker compose up -d redpanda xtdb-primary xtdb-replica

  'xtdb:down':
    desc: Stop XTDB cluster
    cmds:
      - docker compose stop xtdb-replica xtdb-primary redpanda

  'xtdb:reset':
    desc: Destroy all XTDB + Redpanda data and recreate (destructive)
    cmds:
      - docker compose down -v
      - docker compose up -d redpanda xtdb-primary xtdb-replica

  'xtdb:logs':
    desc: Tail XTDB primary logs
    cmds:
      - docker compose logs -f xtdb-primary

  'xtdb:logs:replica':
    desc: Tail XTDB replica logs
    cmds:
      - docker compose logs -f xtdb-replica

  'xtdb:logs:redpanda':
    desc: Tail Redpanda broker logs
    cmds:
      - docker compose logs -f redpanda

  'xtdb:logs:all':
    desc: Tail all XTDB cluster logs
    cmds:
      - docker compose logs -f redpanda xtdb-primary xtdb-replica

  # ── Health checks ──────────────────────────────────────────────

  'xtdb:health':
    desc: Check health of all XTDB cluster components
    cmds:
      - |
        set -euo pipefail
        echo "=== Redpanda ==="
        docker exec redpanda rpk cluster health 2>/dev/null && echo "  OK" || echo "  FAIL"
        echo ""
        echo "=== XTDB Primary (port 5433) ==="
        curl -sf http://localhost:8083/healthz/alive && echo " OK" || echo " FAIL"
        docker run --rm --network host postgres:16-alpine \
          psql -h localhost -p 5433 -U xtdb -d xtdb -c "SELECT 1" > /dev/null 2>&1 && echo "  pgwire OK" || echo "  pgwire FAIL"
        echo ""
        echo "=== XTDB Replica (port 5434) ==="
        curl -sf http://localhost:8084/healthz/alive && echo " OK" || echo " FAIL"
        docker run --rm --network host postgres:16-alpine \
          psql -h localhost -p 5434 -U xtdb -d xtdb -c "SELECT 1" > /dev/null 2>&1 && echo "  pgwire OK" || echo "  pgwire FAIL"

  'xtdb:health:primary':
    desc: Check XTDB primary health
    cmds:
      - curl -sf http://localhost:8083/healthz/alive
      - docker run --rm --network host postgres:16-alpine psql -h localhost -p 5433 -U xtdb -d xtdb -c "SELECT 1"

  'xtdb:health:replica':
    desc: Check XTDB replica health
    cmds:
      - curl -sf http://localhost:8084/healthz/alive
      - docker run --rm --network host postgres:16-alpine psql -h localhost -p 5434 -U xtdb -d xtdb -c "SELECT 1"

  # ── Replica management ─────────────────────────────────────────

  'replica:stop':
    desc: Stop the XTDB replica (for maintenance/backup)
    cmds:
      - docker compose stop xtdb-replica

  'replica:start':
    desc: Start the XTDB replica
    cmds:
      - docker compose up -d xtdb-replica

  # ── Backup via replica (primary never stops) ───────────────────

  'xtdb:backup':
    desc: Backup via replica — flush primary block, stop replica, export-snapshot, tar to ~/backups, restart
    cmds:
      - |
        set -euo pipefail
        TS=$(date +%Y%m%dT%H%M%S)
        BACKUP_BASE="$HOME/backups/xtdb"
        mkdir -p "$BACKUP_BASE"

        echo "1/5  Flushing primary block..."
        curl -sf -X POST http://localhost:8083/system/finish-block || true
        sleep 5

        echo "2/5  Stopping replica..."
        docker compose stop xtdb-replica

        echo "3/5  Exporting snapshot from replica storage..."
        VOLUME=$(docker volume ls -q | grep xtdb-replica-data | head -1)
        docker run --rm \
          --network harness_default \
          -v "$VOLUME":/var/lib/xtdb \
          -v "$(pwd)/xtdb-export.yaml":/usr/local/lib/xtdb/xtdb-export.yaml:ro \
          ghcr.io/xtdb/xtdb-aws:2.1.0 \
          export-snapshot xtdb -f xtdb-export.yaml 2>&1 || echo "  (export-snapshot returned non-zero, check output above)"

        echo "4/5  Copying snapshot to backup directory..."
        LATEST=$(docker run --rm -v "$VOLUME":/var/lib/xtdb:ro alpine \
          sh -c "ls -1t /var/lib/xtdb/buffers/v06/exports/ 2>/dev/null | head -1")
        if [ -z "$LATEST" ]; then
          echo "  No export found in replica volume"
        else
          docker run --rm \
            -v "$VOLUME":/var/lib/xtdb:ro \
            -v "$BACKUP_BASE":/backup \
            alpine \
            sh -c "tar czf /backup/snapshot-${TS}.tar.gz -C /var/lib/xtdb/buffers/v06/exports/${LATEST} ."
          echo "  Archived: snapshot-${TS}.tar.gz ($(du -h "$BACKUP_BASE/snapshot-${TS}.tar.gz" | cut -f1))"
        fi

        echo "5/5  Restarting replica..."
        docker compose up -d xtdb-replica

        echo "Backup complete."

  'xtdb:backup:csv':
    desc: Hot-backup all XTDB tables to CSV via pgwire (no downtime, legacy method)
    cmds:
      - |
        set -euo pipefail
        BACKUP_DIR="$HOME/backups/xtdb/csv-$(date +%Y%m%dT%H%M%S)"
        mkdir -p "$BACKUP_DIR"

        TABLES=$(docker run --rm --network host postgres:16-alpine \
          psql -h localhost -p 5433 -U xtdb -d xtdb --csv -t -A \
          -c "SELECT table_name FROM information_schema.tables WHERE table_schema = 'public'" 2>/dev/null)

        for table in $TABLES; do
          echo "  -> $table"
          docker run --rm --network host -v "$BACKUP_DIR":/out postgres:16-alpine \
            psql -h localhost -p 5433 -U xtdb -d xtdb --csv \
            -c "SELECT * FROM \"$table\"" -o "/out/${table}.csv" 2>/dev/null
        done

        ARCHIVE="$(dirname "$BACKUP_DIR")/$(basename "$BACKUP_DIR").tar.gz"
        tar czf "$ARCHIVE" -C "$(dirname "$BACKUP_DIR")" "$(basename "$BACKUP_DIR")"
        rm -rf "$BACKUP_DIR"
        echo "Backup: $ARCHIVE ($(du -h "$ARCHIVE" | cut -f1))"

  'xtdb:restore':
    desc: Restore XTDB from a CSV backup archive
    requires:
      vars: [ARCHIVE]
    cmds:
      - |
        set -euo pipefail
        TMP=$(mktemp -d)
        tar xzf "{{.ARCHIVE}}" -C "$TMP"
        DIR=$(ls "$TMP")

        for csv in "$TMP/$DIR"/*.csv; do
          table=$(basename "$csv" .csv)
          echo "  -> Restoring $table"
          HEADER=$(head -1 "$csv")
          COLS=$(echo "$HEADER" | sed 's/,/","/g; s/^/"/; s/$/"/')
          tail -n +2 "$csv" | docker run --rm -i --network host postgres:16-alpine \
            psql -h localhost -p 5433 -U xtdb -d xtdb \
            -c "COPY \"$table\" ($COLS) FROM STDIN WITH (FORMAT csv)" 2>/dev/null || \
            echo "    Warning: COPY failed for $table"
        done
        rm -rf "$TMP"
        echo "Restore complete"

  'xtdb:retain':
    desc: Apply retention policy — delete old lifecycle_events, test_runs, etc.
    cmds:
      - npx jiti scripts/retain.ts

  'xtdb:retain:dry':
    desc: Dry-run retention policy — show what would be deleted
    cmds:
      - npx jiti scripts/retain.ts --dry-run

  # ── Redpanda management ────────────────────────────────────────

  'redpanda:topics':
    desc: List Kafka topics in Redpanda
    cmds:
      - docker exec redpanda rpk topic list

  'redpanda:describe':
    desc: Describe the XTDB log topic
    cmds:
      - docker exec redpanda rpk topic describe xtdb-log

  # ── Replication verification ───────────────────────────────────

  'xtdb:verify-replication':
    desc: Verify primary and replica have the same data
    cmds:
      - |
        set -euo pipefail
        echo "Primary event count:"
        docker run --rm --network host postgres:16-alpine \
          psql -h localhost -p 5433 -U xtdb -d xtdb -Atqc "SELECT COUNT(*) FROM events" 2>/dev/null || echo "  (no events table yet)"
        echo "Replica event count:"
        docker run --rm --network host postgres:16-alpine \
          psql -h localhost -p 5434 -U xtdb -d xtdb -Atqc "SELECT COUNT(*) FROM events" 2>/dev/null || echo "  (no events table yet)"
        echo ""
        echo "If counts differ, the replica may still be catching up."

  # ── Shell access ───────────────────────────────────────────────

  'xtdb:psql':
    desc: Open a psql shell against XTDB primary
    cmds:
      - PGPASSWORD=xtdb psql -h localhost -p 5433 -U xtdb -d xtdb

  'xtdb:psql:replica':
    desc: Open a psql shell against XTDB replica
    cmds:
      - PGPASSWORD=xtdb psql -h localhost -p 5434 -U xtdb -d xtdb

  'ui:install':
    desc: Install UI dependencies
    dir: xtdb-event-logger-ui
    cmds:
      - npm install

  ui:
    desc: Start the XTDB event stream UI
    dir: xtdb-event-logger-ui
    cmds:
      - npm start

  'ui:background':
    desc: Start the XTDB event stream UI in the background and write logs to .task/ui.log
    cmds:
      - |
        set -euo pipefail
        mkdir -p .task
        if [ -f .task/ui.pid ] && kill -0 "$(cat .task/ui.pid)" 2>/dev/null; then
          echo "UI already running with PID $(cat .task/ui.pid)"
          exit 0
        fi
        (
          cd xtdb-event-logger-ui
          nohup npm start > ../.task/ui.log 2>&1 &
          echo $! > ../.task/ui.pid
        )
        echo "UI started with PID $(cat .task/ui.pid)"
        echo "Logs: .task/ui.log"

  'ui:stop':
    desc: Stop the background UI started by ui:background
    cmds:
      - |
        set -euo pipefail
        if [ ! -f .task/ui.pid ]; then
          echo "No UI pid file found"
          exit 0
        fi
        PID="$(cat .task/ui.pid)"
        if kill -0 "$PID" 2>/dev/null; then
          kill "$PID"
          echo "Stopped UI process $PID"
        else
          echo "UI process $PID is not running"
        fi
        rm -f .task/ui.pid

  'ops:api:install':
    desc: Install ops API dependencies
    dir: xtdb-ops-api
    cmds:
      - npm install

  'ops:api':
    desc: Start the XTDB ops API
    dir: xtdb-ops-api
    cmds:
      - npx jiti server.ts

  pi:
    desc: Start pi
    cmds:
      - pi

  'agents:deploy':
    desc: Deploy agent definitions into pi's agents + prompts directories
    cmds:
      - |
        set -euo pipefail
        mkdir -p "$HOME/.pi/agent/agents"
        mkdir -p "$HOME/.pi/agent/prompts"
        for file in agents/*.md; do
          test -f "$file" || continue
          name="$(basename "$file")"
          echo "→ Deploying agent $name"
          cp "$file" "$HOME/.pi/agent/agents/$name"
          cp "$file" "$HOME/.pi/agent/prompts/$name"
        done

  'skills:deploy':
    desc: Deploy skill packages into pi's skills directory
    cmds:
      - |
        set -euo pipefail
        mkdir -p "$HOME/.pi/agent/skills"
        for dir in skills/*; do
          test -d "$dir" || continue
          name="$(basename "$dir")"
          echo "→ Deploying skill $name"
          rm -rf "$HOME/.pi/agent/skills/$name"
          cp -r "$dir" "$HOME/.pi/agent/skills/$name"
        done

  'resources:deploy:all':
    desc: Deploy all pi resources (extensions, agents as prompts, skills)
    deps:
      - 'ext:deploy:all'
      - 'agents:deploy'
      - 'skills:deploy'

  'ext:deploy:xtdb-logger':
    desc: Deploy xtdb-event-logger into pi's auto-load directory and install deps
    cmds:
      - mkdir -p "$HOME/.pi/agent/extensions"
      - rm -rf "$HOME/.pi/agent/extensions/xtdb-event-logger"
      - cp -r xtdb-event-logger "$HOME/.pi/agent/extensions/xtdb-event-logger"
      - cd "$HOME/.pi/agent/extensions/xtdb-event-logger" && npm install

  'ext:deploy':
    desc: Deploy a single extension by name, e.g. task ext:deploy EXT=project-registry
    requires:
      vars: [EXT]
    cmds:
      - |
        set -euo pipefail
        test -f "{{.EXT}}/package.json" || { echo "Missing package: {{.EXT}}/package.json"; exit 1; }
        node --input-type=module - <<'EOF'
        import { readFileSync } from 'node:fs';
        const pkg = JSON.parse(readFileSync('{{.EXT}}/package.json', 'utf8'));
        if (!pkg.pi?.extensions) {
          console.error('Package does not declare pi.extensions: {{.EXT}}');
          process.exit(1);
        }
        EOF
        mkdir -p "$HOME/.pi/agent/extensions"
        rm -rf "$HOME/.pi/agent/extensions/{{.EXT}}"
        cp -r "{{.EXT}}" "$HOME/.pi/agent/extensions/{{.EXT}}"
        (cd "$HOME/.pi/agent/extensions/{{.EXT}}" && npm install)

  'lib:deploy':
    desc: Deploy shared lib/ (jsonld helpers, db connection) into pi's extensions directory
    cmds:
      - |
        set -euo pipefail
        mkdir -p "$HOME/.pi/agent/extensions/lib"
        echo "→ Deploying shared lib/"
        rm -rf "$HOME/.pi/agent/extensions/lib"
        cp -r lib "$HOME/.pi/agent/extensions/lib"
        (cd "$HOME/.pi/agent/extensions/lib" && npm install)

  'ext:deploy:all':
    desc: Deploy shared lib + every package in this repo that declares a pi extension
    deps:
      - 'lib:deploy'
    cmds:
      - |
        set -euo pipefail
        mkdir -p "$HOME/.pi/agent/extensions"
        EXTENSIONS="$(node --input-type=module - <<'EOF'
        import { readdirSync, readFileSync, statSync } from 'node:fs';
        import { join } from 'node:path';

        for (const name of readdirSync('.').sort()) {
          try {
            if (!statSync(name).isDirectory()) continue;
            const pkg = JSON.parse(readFileSync(join(name, 'package.json'), 'utf8'));
            if (pkg.pi?.extensions) console.log(name);
          } catch {}
        }
        EOF
        )"
        for dir in $EXTENSIONS; do
          echo "→ Deploying $dir"
          rm -rf "$HOME/.pi/agent/extensions/$dir"
          cp -r "$dir" "$HOME/.pi/agent/extensions/$dir"
          (cd "$HOME/.pi/agent/extensions/$dir" && npm install)
        done

  'ext:list':
    desc: List repo packages that declare a pi extension
    cmds:
      - |
        node --input-type=module - <<'EOF'
        import { readdirSync, readFileSync, statSync } from 'node:fs';
        import { join } from 'node:path';

        for (const name of readdirSync('.').sort()) {
          try {
            if (!statSync(name).isDirectory()) continue;
            const pkg = JSON.parse(readFileSync(join(name, 'package.json'), 'utf8'));
            if (pkg.pi?.extensions) console.log(name);
          } catch {}
        }
        EOF

  'ext:status':
    desc: Show deployed pi extensions under ~/.pi/agent/extensions
    cmds:
      - ls -la "$HOME/.pi/agent/extensions" || true

  'events:count':
    desc: Show the number of rows currently in XTDB's events table
    cmds:
      - PGPASSWORD=xtdb psql -h localhost -p 5433 -U xtdb -d xtdb -Atqc "SELECT COUNT(*) FROM events"

  'events:recent':
    desc: Show the most recent events from XTDB
    cmds:
      - PGPASSWORD=xtdb psql -h localhost -p 5433 -U xtdb -d xtdb -c "SELECT seq, event_name, session_id, ts FROM events ORDER BY seq DESC LIMIT 20"

  'ext:test':
    desc: Load-test all deployed extensions against mock ExtensionAPI
    dir: test
    cmds:
      - NODE_PATH="$(pwd)/node_modules:/usr/lib/node_modules/@mariozechner/pi-coding-agent/node_modules:/usr/lib/node_modules" npx jiti ext-load-test.ts

  smoke:
    desc: Post-deploy smoke test — verify all extensions, agents, skills, and prompts are deployed
    dir: test
    cmds:
      - npx jiti smoke-test.ts

  doctor:
    desc: Verify XTDB cluster, deployed logger, and current event count
    deps:
      - 'xtdb:health:primary'
    cmds:
      - 'test -d "$HOME/.pi/agent/extensions/xtdb-event-logger" && echo "xtdb-event-logger deployed" || (echo "xtdb-event-logger missing"; exit 1)'
      - 'echo "Current XTDB event count:"'
      - 'PGPASSWORD=xtdb psql -h localhost -p 5433 -U xtdb -d xtdb -Atqc "SELECT COUNT(*) FROM events"'

  # ── Code Quality ─────────────────────────────────────────────────

  check:
    desc: Run all quality checks (format + lint + import sorting)
    cmds:
      - npx biome check .

  fmt:
    desc: Auto-fix formatting, imports, and safe lint fixes
    cmds:
      - npx biome check --write .

  lint:
    desc: Run linter only (no formatting)
    cmds:
      - npx biome lint .

  'check:ci':
    desc: Quality check for CI — exits non-zero on any issue
    cmds:
      - npx biome ci .

  'hooks:install':
    desc: Enable git pre-commit quality hook
    cmds:
      - git config core.hooksPath .githooks
      - echo "✅ Git hooks enabled. Pre-commit will run quality checks on staged files."

  # ── CI Runner ────────────────────────────────────────────────────

  'ci:runner':
    desc: Start the CI runner (watches queue, runs pipelines in Docker)
    cmds:
      - npx tsx ci-runner/runner.ts

  'ci:run':
    desc: Run CI pipeline on current repo (one-shot, no queue)
    cmds:
      - |
        JOB=$(mktemp /tmp/ci-job-XXXXXX.json)
        cat > "$JOB" << EOF
        {
          "id": "manual-$(date +%s)",
          "repo": "$(basename $(pwd))",
          "ref": "refs/heads/$(git branch --show-current)",
          "commitHash": "$(git rev-parse HEAD)",
          "commitMessage": "$(git log -1 --format=%s)",
          "pusher": "$(whoami)",
          "timestamp": $(date +%s000)
        }
        EOF
        npx tsx ci-runner/runner.ts --once "$JOB"
        rm -f "$JOB"

  'ci:hook:install':
    desc: Install Soft Serve post-receive hook for CI
    vars:
      SS_DATA: '{{.SOFT_SERVE_DATA_PATH | default "/var/local/lib/soft-serve"}}'
    cmds:
      - mkdir -p {{.SS_DATA}}/hooks
      - cp ci-runner/hooks/post-receive {{.SS_DATA}}/hooks/post-receive
      - chmod +x {{.SS_DATA}}/hooks/post-receive
      - echo "✅ Soft Serve CI hook installed at {{.SS_DATA}}/hooks/post-receive"
