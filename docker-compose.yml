services:
  # ── Reverse Proxy (ONLY service with exposed ports) ────────────
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports: ["80:80"]
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on: [harness-ui, chat-ws]

  # ── Kafka-compatible broker ────────────────────────────────────
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:9092
      - --pandaproxy-addr internal://0.0.0.0:8082
      - --advertise-pandaproxy-addr internal://redpanda:8082
      - --schema-registry-addr internal://0.0.0.0:8081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 1G
      - --mode dev-container
      - --default-log-level=warn
      - --set redpanda.kafka_batch_max_bytes=10485760
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Garage (S3-compatible shared object store for XTDB) ────────
  garage:
    image: dxflrs/garage:v1.1.0
    container_name: garage
    restart: unless-stopped
    volumes:
      - garage-data:/var/lib/garage
      - ./garage.toml:/etc/garage.toml:ro
    # Note: scratch image has no shell — healthcheck via garage-init wait loop instead

  # ── Bootstrap Garage: layout + bucket + API key ────────────────
  garage-init:
    image: alpine:3.21
    container_name: garage-init
    depends_on:
      garage:
        condition: service_started
    volumes:
      - ./garage-init.sh:/garage-init.sh:ro
    entrypoint: ["/bin/sh", "/garage-init.sh"]
    restart: "no"

  # ── XTDB primary (writes + reads) ─────────────────────────────
  xtdb-primary:
    image: ghcr.io/xtdb/xtdb-aws:2.1.0
    container_name: xtdb-events          # preserved for backwards compat
    command: ["-f", "xtdb-primary.yaml"]
    restart: unless-stopped
    volumes:
      - xtdb-primary-data:/var/lib/xtdb
      - ./xtdb-primary.yaml:/usr/local/lib/xtdb/xtdb-primary.yaml:ro
    environment:
      JDK_JAVA_OPTIONS: >-
        -Xms2g
        -Xmx4g
        -XX:MaxDirectMemorySize=4g
    deploy:
      resources:
        limits:
          memory: 10g
    depends_on:
      redpanda:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/healthz/alive || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  # ── XTDB replica (hot standby, stoppable for backup) ──────────
  xtdb-replica:
    image: ghcr.io/xtdb/xtdb-aws:2.1.0
    container_name: xtdb-replica
    command: ["-f", "xtdb-replica.yaml"]
    restart: unless-stopped
    volumes:
      - xtdb-replica-data:/var/lib/xtdb
      - ./xtdb-replica.yaml:/usr/local/lib/xtdb/xtdb-replica.yaml:ro
    environment:
      JDK_JAVA_OPTIONS: >-
        -Xms2g
        -Xmx4g
        -XX:MaxDirectMemorySize=4g
    deploy:
      resources:
        limits:
          memory: 10g
    depends_on:
      redpanda:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/healthz/alive || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:26.2.4
    container_name: keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: dev-mem
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3; cat <&3 | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── QLever (read-only SPARQL endpoint over JSON-LD graph) ──────
  # Uses qlever-server binary directly (not the Python CLI wrapper).
  # Index must be built first via scripts/qlever-index.sh.
  qlever:
    image: adfreiburg/qlever:latest
    container_name: qlever
    restart: unless-stopped
    entrypoint: []
    command: ["bash", "-c", "test -f /data/harness.index.pos && exec /qlever/qlever-server -i /data/harness -p 7001 -n -m 1GB || (echo 'No index found. Run scripts/qlever-index.sh first.' && sleep infinity)"]
    user: root
    volumes:
      - qlever-data:/data
    working_dir: /data

  # ── Soft Serve (Git Server) ───────────────────────────────────────
  # Self-hosted Git server. Repos pushed here trigger CI via post-receive hook.
  # Admin access via SSH key configured in SOFT_SERVE_INITIAL_ADMIN_KEYS.
  soft-serve:
    image: charmcli/soft-serve:latest
    container_name: soft-serve
    restart: unless-stopped
    volumes:
      - soft-serve-data:/soft-serve
    environment:
      SOFT_SERVE_DATA_PATH: /soft-serve
      SOFT_SERVE_INITIAL_ADMIN_KEYS: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOmJmcsP1uIiTFfTkavjEmDr4W+9iTecbPU4KTJi0efv opunix@fs.evalgo.org"

  # ── OCI Registry (Zot) ──────────────────────────────────────────
  zot:
    image: ghcr.io/project-zot/zot-minimal-linux-arm64:latest
    container_name: zot
    restart: unless-stopped
    volumes:
      - zot-data:/var/lib/zot
      - ./zot-config.json:/etc/zot/config.json:ro

  # ── App Services ────────────────────────────────────────────────
  event-api:
    image: harness/event-api:latest
    container_name: event-api
    restart: unless-stopped
    environment:
      UI_PORT: "3333"
      XTDB_EVENT_HOST: xtdb-primary
      XTDB_EVENT_PORT: "5432"
    depends_on: [xtdb-primary]

  chat-ws:
    image: harness/chat-ws:latest
    container_name: chat-ws
    restart: unless-stopped
    environment:
      PORT: "3334"

  ops-api:
    image: harness/ops-api:latest
    container_name: ops-api
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      OPS_PORT: "3335"
      XTDB_EVENT_HOST: xtdb-primary
      XTDB_EVENT_PORT: "5432"
      XTDB_REPLICA_HOST: xtdb-replica
      XTDB_REPLICA_PORT: "5432"
      XTDB_PRIMARY_HEALTH: http://xtdb-primary:8080
      XTDB_REPLICA_HEALTH: http://xtdb-replica:8080
      DOCKER_NETWORK: harness_default
    depends_on: [xtdb-primary, redpanda]

  harness-ui:
    image: harness/harness-ui:latest
    container_name: harness-ui
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - ci-queue:/app/ci-queue
    environment:
      PORT: "3336"
      CI_QUEUE_DIR: /app/ci-queue
      EVENT_API_URL: http://event-api:3333
      OPS_API_URL: http://ops-api:3335
      COLLECTOR_URL: http://docker-event-collector:3338
      SOFT_SERVE_HOST: soft-serve
      CHAT_WS_URL: ws://localhost/ws
      CHAT_HTTP_URL: http://chat-ws:3334
      QLEVER_URL: http://qlever:7001
      REDPANDA_HOST: redpanda
      REDPANDA_PORT: "9092"
      GARAGE_URL: http://garage:3900
      XTDB_PRIMARY_HEALTH: http://xtdb-primary:8080
      XTDB_REPLICA_HEALTH: http://xtdb-replica:8080
      KEYCLOAK_URL: http://keycloak:8080
      SOFT_SERVE_HTTP: http://soft-serve:23232
      ZOT_URL: http://zot:5000
      BUILD_SERVICE_URL: http://build-service:3339
    depends_on: [event-api, ops-api, chat-ws]

  ci-runner:
    image: harness/ci-runner:latest
    container_name: ci-runner
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ci-queue:/app/ci-queue
      - ci-work:/app/ci-work
    environment:
      PORT: "3337"
      XTDB_EVENT_HOST: xtdb-primary
      XTDB_EVENT_PORT: "5432"
      SOFT_SERVE_SSH: ssh://soft-serve:23231
      CI_QUEUE_DIR: /app/ci-queue
      CI_WORK_DIR: /app/ci-work
      CI_WORK_VOLUME: harness_ci-work
      DOCKER_NETWORK: harness_default
      HARNESS_UI_URL: http://harness-ui:3336
      BUILD_SERVICE_URL: http://build-service:3339
    depends_on: [xtdb-primary, soft-serve, build-service]

  docker-event-collector:
    image: harness/docker-event-collector:latest
    container_name: docker-event-collector
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      COLLECTOR_PORT: "3338"
      XTDB_URL: postgresql://xtdb-primary:5432/xtdb
      DOCKER_SOCKET: /var/run/docker.sock
      HARNESS_UI_URL: http://harness-ui:3336
    depends_on: [xtdb-primary]

  build-service:
    build: { context: ., dockerfile: build-service/Dockerfile }
    image: harness/build-service:latest
    container_name: build-service
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      PORT: "3339"
      XTDB_EVENT_HOST: xtdb-primary
      XTDB_EVENT_PORT: "5432"
      SOFT_SERVE_SSH: ssh://soft-serve:23231
      REGISTRY: zot:5000
      HARNESS_UI_URL: http://harness-ui:3336
    depends_on: [xtdb-primary, soft-serve]

volumes:
  redpanda-data:
  xtdb-primary-data:
  xtdb-replica-data:
  garage-data:
  qlever-data:
  soft-serve-data:
  zot-data:
  ci-queue:
  ci-work:
  caddy-data:
  caddy-config:
