services:
  # ── Kafka-compatible broker ────────────────────────────────────
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 1G
      - --mode dev-container
      - --default-log-level=warn
      - --set redpanda.kafka_batch_max_bytes=10485760
    ports:
      - "19092:19092"   # Kafka API (external / host debugging)
      - "18082:18082"   # HTTP Proxy
      - "18081:18081"   # Schema Registry
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Garage (S3-compatible shared object store for XTDB) ────────
  garage:
    image: dxflrs/garage:v1.1.0
    container_name: garage
    restart: unless-stopped
    volumes:
      - garage-data:/var/lib/garage
      - ./garage.toml:/etc/garage.toml:ro
    ports:
      - "3900:3900"    # S3 API
      - "3903:3903"    # Admin API
    # Note: scratch image has no shell — healthcheck via garage-init wait loop instead

  # ── Bootstrap Garage: layout + bucket + API key ────────────────
  garage-init:
    image: alpine:3.21
    container_name: garage-init
    depends_on:
      garage:
        condition: service_started
    volumes:
      - ./garage-init.sh:/garage-init.sh:ro
    entrypoint: ["/bin/sh", "/garage-init.sh"]
    restart: "no"

  # ── XTDB primary (writes + reads) ─────────────────────────────
  xtdb-primary:
    image: ghcr.io/xtdb/xtdb-aws:2.1.0
    container_name: xtdb-events          # preserved for backwards compat
    command: ["-f", "xtdb-primary.yaml"]
    restart: unless-stopped
    ports:
      - "5433:5432"   # Postgres wire protocol (same as before)
      - "8083:8080"   # Healthz
    volumes:
      - xtdb-primary-data:/var/lib/xtdb
      - ./xtdb-primary.yaml:/usr/local/lib/xtdb/xtdb-primary.yaml:ro
    environment:
      JDK_JAVA_OPTIONS: >-
        -Xms2g
        -Xmx4g
        -XX:MaxDirectMemorySize=4g
    deploy:
      resources:
        limits:
          memory: 10g
    depends_on:
      redpanda:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/healthz/alive || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  # ── XTDB replica (hot standby, stoppable for backup) ──────────
  xtdb-replica:
    image: ghcr.io/xtdb/xtdb-aws:2.1.0
    container_name: xtdb-replica
    command: ["-f", "xtdb-replica.yaml"]
    restart: unless-stopped
    ports:
      - "5434:5432"   # Postgres wire protocol (replica)
      - "8084:8080"   # Healthz (replica)
    volumes:
      - xtdb-replica-data:/var/lib/xtdb
      - ./xtdb-replica.yaml:/usr/local/lib/xtdb/xtdb-replica.yaml:ro
    environment:
      JDK_JAVA_OPTIONS: >-
        -Xms2g
        -Xmx4g
        -XX:MaxDirectMemorySize=4g
    deploy:
      resources:
        limits:
          memory: 10g
    depends_on:
      redpanda:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/healthz/alive || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:26.2.4
    container_name: keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: dev-mem
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3; cat <&3 | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── QLever (read-only SPARQL endpoint over JSON-LD graph) ──────
  # Uses qlever-server binary directly (not the Python CLI wrapper).
  # Index must be built first via scripts/qlever-index.sh.
  qlever:
    image: adfreiburg/qlever:latest
    container_name: qlever
    restart: unless-stopped
    entrypoint: []
    command: ["bash", "-c", "test -f /data/harness.index.pos && exec /qlever/qlever-server -i /data/harness -p 7001 -n -m 1GB || (echo 'No index found. Run scripts/qlever-index.sh first.' && sleep infinity)"]
    user: root
    ports:
      - "7001:7001"
    volumes:
      - qlever-data:/data
    working_dir: /data

volumes:
  redpanda-data:
  xtdb-primary-data:
  xtdb-replica-data:
  garage-data:
  qlever-data:
