# ─── Code Quality CI ──────────────────────────────────────────────
# Runs on every push and PR. This is the ONLY gate that cannot be
# bypassed — git hooks can be skipped, editors can be misconfigured,
# but CI runs on the server.
#
# Uses `biome ci` which is designed for CI: exits non-zero on any
# issue, outputs machine-readable diagnostics, no auto-fix.
# ──────────────────────────────────────────────────────────────────

name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Format + Lint + Imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome CI
        run: npx biome ci .
