# Prometheus configuration for harness

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Enable remote write receiver so OTEL collector can push metrics
remote_write: []

scrape_configs:
  # Scrape Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Scrape OTEL Collector metrics
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]

  # Scrape Temporal Server metrics
  - job_name: "temporal"
    static_configs:
      - targets: ["temporal:9090"]
    metrics_path: /metrics

  # Scrape Tempo metrics
  - job_name: "tempo"
    static_configs:
      - targets: ["tempo:3200"]
    metrics_path: /metrics

# Enable remote write receiver endpoint
# so otel-collector's prometheusremotewrite exporter can push
remote_write_receiver:
  enabled: true
